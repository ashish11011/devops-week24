name: Deployment to staging
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  redeploy_staging:
    runs-on: ubuntu-latest
    name: Deploy to staging jobs
    
    steps:
      - name: SSH into server
        run: |
          echo ${{ secrets.SSH_PRIVATE_KEY }} > secret_key
          ssh -i secret_key ubuntu@15.206.67.99 << 'EOF'
            cd ~/devops-week24
            git checkout main
            git pull origin main
            npm install
            pm2 restart 1
          EOF